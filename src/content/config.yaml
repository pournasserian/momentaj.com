# CMS Configuration for Momentaj Site
# Edit this file to configure your content collections

name: Momentaj Site
content_format: json

# Media configuration
media:
  folder: media
  allowed_types:
    - image/*
    - application/pdf

# ===========================================
# SINGLETON COLLECTIONS (Single Items)
# ===========================================
# Use singleton: true for collections that should only have ONE item
# Examples: settings, site_config, navigation, footer

singleton_collections:
  # Site Settings - Global site configuration
  - name: settings
    label: Site Settings
    slug: settings
    folder: _settings
    singleton: true
    filename: settings.json
    description: Global site configuration (logo, contact info, social links)
    fields:
      - name: site_name
        type: text
        label: Site Name
        required: true
        default: Momentaj
      - name: site_description
        type: textarea
        label: Site Description
        rows: 3
        default: Professional software development and consulting services
      - name: logo
        type: image
        label: Logo
        folder: settings
      - name: favicon
        type: image
        label: Favicon
        folder: settings
      - name: email
        type: text
        label: Contact Email
        placeholder: hello@example.com
      - name: phone
        type: text
        label: Phone Number
        placeholder: +1 234 567 8900
      - name: address
        type: textarea
        label: Address
        rows: 2
      - name: social_links
        type: json
        label: Social Links (JSON)
        default: {}
        placeholder: '{"linkedin": "", "twitter": "", "github": ""}'

  # SEO Settings - Global SEO configuration
  - name: seo
    label: SEO Settings
    slug: seo
    folder: _settings
    singleton: true
    filename: seo.json
    description: Global SEO and meta settings
    fields:
      - name: site_title
        type: text
        label: Default Site Title
        default: Momentaj - Software Development & Consulting
      - name: site_keywords
        type: text
        label: Default Keywords
        placeholder: comma-separated keywords
      - name: og_image
        type: image
        label: Open Graph Image
        folder: settings
        description: Default image for social sharing
      - name: google_analytics_id
        type: text
        label: Google Analytics ID
        placeholder: G-XXXXXXXXXX
      - name: google_tag_manager_id
        type: text
        label: Google Tag Manager ID
        placeholder: GTM-XXXXXXX
      - name: robots_txt
        type: textarea
        label: Custom Robots.txt
        rows: 5
        description: Custom robots.txt content

  # Navigation Menu Configuration
  - name: navigation
    label: Navigation Menu
    slug: navigation
    folder: _settings
    singleton: true
    filename: navigation.json
    description: Main navigation menu items
    fields:
      - name: items
        type: json
        label: Menu Items (JSON)
        default: []
        description: 'Array of {label, url, children[]}'
        placeholder: '[{"label": "Home", "url": "/"}]'

# ===========================================
# PAGES COLLECTION
# ===========================================
# Use singleton: true for single pages (about, contact, etc.)
# Use multiple: true for page collections with multiple items

pages:
  # Home Page
  - name: home
    label: Home Page
    slug: home
    folder: pages
    singleton: true
    template: homepage
    description: Homepage content and hero section
    # Default SEO for this page (can be overridden in content)
    seo:
      title: Home
      description: Professional software development and consulting services
      og_type: website
    fields:
      - name: page_title
        type: text
        label: Page Title
        required: true
        default: Welcome
      - name: hero_title
        type: text
        label: Hero Title
        required: true
        default: Building Digital Solutions That Matter
      - name: hero_subtitle
        type: textarea
        label: Hero Subtitle
        rows: 2
        default: We transform ideas into powerful software solutions
      - name: hero_cta_text
        type: text
        label: Hero CTA Text
        default: Get Started
      - name: hero_cta_link
        type: text
        label: Hero CTA Link
        default: /contact-us
      - name: hero_image
        type: image
        label: Hero Image
        folder: pages
      - name: featured_services_title
        type: text
        label: Featured Services Title
        default: Our Services
      - name: featured_case_studies_title
        type: text
        label: Featured Case Studies Title
        default: Featured Work
      - name: cta_title
        type: text
        label: CTA Section Title
        default: Ready to Start Your Project?
      - name: cta_subtitle
        type: textarea
        label: CTA Section Subtitle
        rows: 2
        default: Let us help you build your next great idea
      - name: cta_button_text
        type: text
        label: CTA Button Text
        default: Contact Us
      # SEO Tab Fields - Managed by Marketing
      - name: seo_title
        type: text
        label: SEO Title
        description: Override page title for search engines
        placeholder: Custom SEO title (leave empty to use default)
      - name: seo_description
        type: textarea
        label: SEO Description
        description: Meta description for search engines
        rows: 3
        placeholder: Custom meta description
      - name: seo_og_image
        type: image
        label: SEO Open Graph Image
        description: Image for social media sharing
        folder: pages
      - name: seo_canonical_url
        type: text
        label: Canonical URL
        description: Override the default URL
        placeholder: https://example.com/page
      - name: seo_no_index
        type: boolean
        label: Hide from Search Engines
        description: Prevent search engines from indexing this page
        default: false
      - name: seo_no_follow
        type: boolean
        label: Do Not Follow Links
        description: Tell search engines not to follow links on this page
        default: false

  # About Page
  - name: about
    label: About Page
    slug: about
    folder: pages
    singleton: true
    template: page
    description: About us page content
    seo:
      title: About Us
      description: Learn about Momentaj - our team, mission, and values
    fields:
      - name: page_title
        type: text
        label: Page Title
        required: true
        default: About Us
      - name: hero_image
        type: image
        label: Hero Image
        folder: pages
      - name: content
        type: markdown
        label: Page Content
        rows: 15
        default: "## Our Story\n\nTell your company's story here...\n\n## Our Mission\n\nDescribe your mission..."
      - name: team_section_title
        type: text
        label: Team Section Title
        default: Meet Our Team
      - name: team_section_content
        type: markdown
        label: Team Section Content
        rows: 5
        default: "Introduce your team members here..."
      - name: values_section_title
        type: text
        label: Values Section Title
        default: Our Values
      - name: values
        type: json
        label: Values (JSON)
        default: []
        description: Array of {title, description, icon}
      # SEO Tab Fields - Managed by Marketing
      - name: seo_title
        type: text
        label: SEO Title
        description: Override page title for search engines
      - name: seo_description
        type: textarea
        label: SEO Description
        description: Meta description for search engines
        rows: 3
      - name: seo_og_image
        type: image
        label: SEO Open Graph Image
        description: Image for social media sharing
        folder: pages
      - name: seo_canonical_url
        type: text
        label: Canonical URL
      - name: seo_no_index
        type: boolean
        label: Hide from Search Engines
        default: false
      - name: seo_no_follow
        type: boolean
        label: Do Not Follow Links
        default: false

  # Contact Page
  - name: contact
    label: Contact Page
    slug: contact
    folder: pages
    singleton: true
    template: page
    description: Contact page with form and information
    seo:
      title: Contact Us
      description: Get in touch with us for your next project
    fields:
      - name: page_title
        type: text
        label: Page Title
        required: true
        default: Contact Us
      - name: hero_image
        type: image
        label: Hero Image
        folder: pages
      - name: content
        type: markdown
        label: Page Content
        rows: 10
        default: "## Get In Touch\n\nWe'd love to hear from you. Whether you have a question about our services, pricing, or anything else, our team is ready to answer all your questions."
      - name: show_contact_form
        type: boolean
        label: Show Contact Form
        default: true
      - name: form_fields
        type: json
        label: Form Fields (JSON)
        default: '[{"name": "name", "type": "text", "label": "Name", "required": true}, {"name": "email", "type": "email", "label": "Email", "required": true}, {"name": "message", "type": "textarea", "label": "Message", "required": true}]'
      - name: form_email_to
        type: text
        label: Form Email Recipients
        placeholder: email1@example.com, email2@example.com
      - name: form_success_message
        type: textarea
        label: Form Success Message
        rows: 2
        default: Thank you for your message! We'll get back to you soon.
      - name: contact_info_title
        type: text
        label: Contact Info Section Title
        default: Other Ways to Reach Us
      # SEO Tab Fields - Managed by Marketing
      - name: seo_title
        type: text
        label: SEO Title
        description: Override page title for search engines
      - name: seo_description
        type: textarea
        label: SEO Description
        description: Meta description for search engines
        rows: 3
      - name: seo_og_image
        type: image
        label: SEO Open Graph Image
        description: Image for social media sharing
        folder: pages
      - name: seo_canonical_url
        type: text
        label: Canonical URL
      - name: seo_no_index
        type: boolean
        label: Hide from Search Engines
        default: false
      - name: seo_no_follow
        type: boolean
        label: Do Not Follow Links
        default: false

# ===========================================
# CONTENT COLLECTIONS (Multiple Items)
# ===========================================
collections:
  # Case Studies Collection
  - name: case_studies
    label: Case Studies
    slug: case-studies
    folder: case-studies
    fields:
      - name: title
        type: text
        label: Title
        required: true
      - name: slug
        type: text
        label: URL Slug
        required: true
      - name: client
        type: text
        label: Client Name
        required: true
      - name: description
        type: textarea
        label: Short Description
        rows: 3
        required: true
      - name: content
        type: markdown
        label: Full Content
        rows: 10
      - name: hero_image
        type: image
        label: Hero Image
        folder: case-studies
      - name: tags
        type: text
        label: Tags
        placeholder: comma-separated tags
      - name: featured
        type: boolean
        label: Featured
        default: false
      - name: order
        type: number
        label: Display Order
        default: 0

  # Services Collection
  - name: services
    label: Services
    slug: services
    folder: services
    fields:
      - name: title
        type: text
        label: Service Title
        required: true
      - name: slug
        type: text
        label: URL Slug
        required: true
      - name: short_description
        type: textarea
        label: Short Description
        rows: 2
        required: true
      - name: content
        type: markdown
        label: Full Content
        rows: 10
      - name: icon
        type: text
        label: Icon Name
        placeholder: e.g., code, cloud, design
      - name: featured
        type: boolean
        label: Featured
        default: false
      - name: order
        type: number
        label: Display Order
        default: 0

  # Team Members Collection
  - name: team
    label: Team Members
    slug: team
    folder: team
    fields:
      - name: name
        type: text
        label: Name
        required: true
      - name: slug
        type: text
        label: URL Slug
        required: true
      - name: role
        type: text
        label: Role/Position
        required: true
      - name: bio
        type: textarea
        label: Biography
        rows: 4
      - name: photo
        type: image
        label: Photo
        folder: team
      - name: email
        type: text
        label: Email
      - name: linkedin
        type: text
        label: LinkedIn URL
      - name: order
        type: number
        label: Display Order
        default: 0

  # Testimonials Collection
  - name: testimonials
    label: Testimonials
    slug: testimonials
    folder: testimonials
    fields:
      - name: name
        type: text
        label: Name
        required: true
      - name: role
        type: text
        label: Role/Title
        required: true
      - name: company
        type: text
        label: Company
      - name: quote
        type: textarea
        label: Testimonial Quote
        rows: 4
        required: true
      - name: photo
        type: image
        label: Photo
        folder: testimonials
      - name: featured
        type: boolean
        label: Featured
        default: false

  # Blog Posts Collection
  - name: blog
    label: Blog Posts
    slug: blog
    folder: blog
    fields:
      - name: title
        type: text
        label: Title
        required: true
      - name: slug
        type: text
        label: URL Slug
        required: true
      - name: excerpt
        type: textarea
        label: Excerpt
        rows: 3
        required: true
      - name: content
        type: markdown
        label: Content
        rows: 15
      - name: cover_image
        type: image
        label: Cover Image
        folder: blog
      - name: author
        type: text
        label: Author
      - name: published_date
        type: date
        label: Published Date
      - name: tags
        type: text
        label: Tags
        placeholder: comma-separated tags
      - name: featured
        type: boolean
        label: Featured
        default: false
